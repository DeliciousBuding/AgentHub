version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agenthub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  hub:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
      - "6060:6060"
    environment:
      AGENTHUB_DB_HOST: postgres
      AGENTHUB_DB_PORT: "5432"
      AGENTHUB_REDIS_HOST: redis
      AGENTHUB_REDIS_PORT: "6379"
      AGENTHUB_JWT_SECRET: ${AGENTHUB_JWT_SECRET:-dev-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
  redisdata:
