openapi: 3.1.0
info:
  title: AgentHub REST API
  version: v1
  description: >
    AgentHub REST JSON API for commands and queries. Realtime state, logs,
    message deltas, approvals and artifact notifications are delivered through
    WebSocket typed events documented in api/events.md.

    ## Implementation Status (2026-05-24)

    **Edge Server**: Core endpoints (health/runs/threads/projects/agents/events/permissions)
    are fully implemented. P0 endpoints for approvals, artifacts, previews, workspaces,
    and runner management are declared but not yet implemented — see phase tags.

    **Hub Server**: All documented `/client/auth`, `/client/contacts`, `/client/sessions`,
    `/client/messages`, `/edge/*`, `/web/*` endpoints are implemented. Additional routes
    exist in code but are not yet documented here (~36 routes for session members,
    message pins, attachments, notifications, custom agents, contacts search/block).
    The legacy `/v1/auth`, `/v1/users`, `/v1/contacts` paths are planned for future
    migration and not currently implemented.

    ## Status tags
    - `x-agenthub-status: implemented` — 已实现，可直接调用
    - `x-agenthub-status: planned` — 远期规划，尚未实现
servers:
  - url: http://127.0.0.1:3210
    description: Local Edge Server
  - url: http://localhost:8080
    description: Local Hub Server
  - url: http://api.hub.vectorcontrol.tech
    description: Production Hub Server (hk2)
tags:
  - name: Foundation
    description: Health, capability and event stream handshake.
  - name: IMProject
    description: Project, conversation, thread, message and item APIs.
  - name: ExecutionRunner
    description: Runner, AgentRun, approval, artifact, preview and workspace APIs.
  - name: HubSyncRelay
    description: Auth, user, contact, group, device, edge, sync, relay and cloud APIs.

paths:
  /v1/health:
    get:
      tags: [Foundation]
      operationId: getHealth
      summary: Health check.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/events:
    get:
      tags: [Foundation]
      operationId: openEventStream
      summary: Open WebSocket event stream.
      description: WebSocket handshake surface. Event envelope and event types are documented in api/events.md.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "101":
          description: Switching Protocols.
        "401":
          $ref: "#/components/responses/Error"

  /v1/projects:
    get:
      tags: [IMProject]
      operationId: listProjects
      summary: List projects.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          $ref: "#/components/responses/List"
    post:
      tags: [IMProject]
      operationId: createProject
      summary: Create or register a project.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /v1/projects/{projectId}:
    get:
      tags: [IMProject]
      operationId: getProject
      summary: Get project.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [IMProject]
      operationId: updateProject
      summary: Update project.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [IMProject]
      operationId: deleteProject
      summary: Delete or unregister project.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: Deleted.

  /v1/projects/{projectId}/memory:
    get:
      tags: [IMProject]
      operationId: getProjectMemory
      summary: Get project memory metadata.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    patch:
      tags: [IMProject]
      operationId: updateProjectMemory
      summary: Update project memory metadata.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/conversations:
    get:
      tags: [IMProject]
      operationId: listConversations
      summary: List conversations.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      responses:
        "200":
          $ref: "#/components/responses/List"
    post:
      tags: [IMProject]
      operationId: createConversation
      summary: Create conversation.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /v1/conversations/{conversationId}:
    get:
      tags: [IMProject]
      operationId: getConversation
      summary: Get conversation.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    patch:
      tags: [IMProject]
      operationId: updateConversation
      summary: Update conversation.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/conversations/{conversationId}:archive:
    post:
      tags: [IMProject]
      operationId: archiveConversation
      summary: Archive conversation.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/conversations/{conversationId}/members:
    get:
      tags: [IMProject]
      operationId: listConversationMembers
      summary: List conversation members.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "200":
          $ref: "#/components/responses/List"
    post:
      tags: [IMProject]
      operationId: addConversationMember
      summary: Add conversation member.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /v1/conversations/{conversationId}/members/{memberId}:
    delete:
      tags: [IMProject]
      operationId: removeConversationMember
      summary: Remove conversation member.
      x-agenthub-phase: P1
      x-agenthub-owner: Hub
      parameters:
        - $ref: "#/components/parameters/ConversationId"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "204":
          description: Removed.

  /v1/threads:
    get:
      tags: [IMProject]
      operationId: listThreads
      summary: List threads.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ProjectIdQuery"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          $ref: "#/components/responses/List"
    post:
      tags: [IMProject]
      operationId: createThread
      summary: Create thread.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /v1/threads/{threadId}:
    get:
      tags: [IMProject]
      operationId: getThread
      summary: Get thread.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    patch:
      tags: [IMProject]
      operationId: updateThread
      summary: Update thread.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/threads/{threadId}:archive:
    post:
      tags: [IMProject]
      operationId: archiveThread
      summary: Archive thread.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/threads/{threadId}:fork:
    post:
      tags: [IMProject]
      operationId: forkThread
      summary: Fork thread.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /v1/threads/{threadId}/items:
    get:
      tags: [IMProject]
      operationId: listThreadItems
      summary: List thread items.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ThreadId"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          $ref: "#/components/responses/List"

  /v1/threads/{threadId}/messages:
    post:
      tags: [IMProject]
      operationId: createThreadMessage
      summary: Create user message in thread.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadMessageRequest"
      responses:
        "201":
          description: Message item created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /v1/items/{itemId}:
    get:
      tags: [IMProject]
      operationId: getItem
      summary: Get item.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/runners:
    get:
      tags: [ExecutionRunner]
      operationId: listRunners
      summary: List runners.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "200":
          description: Runner list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"

  /v1/agents:
    get:
      tags: [ExecutionRunner]
      operationId: listAgents
      summary: List available agent adapters.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "200":
          description: Agent adapter list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResponse"

  /v1/runners/{runnerId}:
    get:
      tags: [ExecutionRunner]
      operationId: getRunner
      summary: Get runner.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunnerId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/runners/{runnerId}:ping:
    post:
      tags: [ExecutionRunner]
      operationId: pingRunner
      summary: Ping runner.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunnerId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/runners/{runnerId}:drain:
    post:
      tags: [ExecutionRunner]
      operationId: drainRunner
      summary: Stop assigning new runs to runner.
      x-agenthub-phase: P2
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunnerId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/runs:
    get:
      tags: [ExecutionRunner]
      operationId: listRuns
      summary: List AgentRuns.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ThreadIdQuery"
        - $ref: "#/components/parameters/PageSize"
        - $ref: "#/components/parameters/PageCursor"
      responses:
        "200":
          $ref: "#/components/responses/List"
    post:
      tags: [ExecutionRunner]
      operationId: startRun
      summary: Start AgentRun.
      description: >
        Starts a local AgentRun. P0 accepts an empty body for Desktop Shell
        compatibility and falls back to the default local project/thread.
        New callers should pass projectId and threadId explicitly.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartRunRequest"
      responses:
        "202":
          description: Run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"

  /v1/runs/{runId}:
    get:
      tags: [ExecutionRunner]
      operationId: getRun
      summary: Get AgentRun.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/runs/{runId}:cancel:
    post:
      tags: [ExecutionRunner]
      operationId: cancelRun
      summary: Cancel AgentRun.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/runs/{runId}:interrupt:
    post:
      tags: [ExecutionRunner]
      operationId: interruptRun
      summary: Interrupt AgentRun.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/runs/{runId}:resume:
    post:
      tags: [ExecutionRunner]
      operationId: resumeRun
      summary: Resume AgentRun.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/runs/{runId}:retry:
    post:
      tags: [ExecutionRunner]
      operationId: retryRun
      summary: Retry AgentRun.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/runs/{runId}/items:
    get:
      tags: [ExecutionRunner]
      operationId: listRunItems
      summary: List run items.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          $ref: "#/components/responses/List"

  /v1/runs/{runId}/logs:
    get:
      tags: [ExecutionRunner]
      operationId: getRunLogs
      summary: Get run logs snapshot.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/runs/{runId}/diff:
    get:
      tags: [ExecutionRunner]
      operationId: getRunDiff
      summary: Get run diff snapshot.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/approvals:
    get:
      tags: [ExecutionRunner]
      operationId: listApprovals
      summary: List approval requests.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "200":
          $ref: "#/components/responses/List"

  /v1/approvals/{approvalId}:
    get:
      tags: [ExecutionRunner]
      operationId: getApproval
      summary: Get approval request.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/approvals/{approvalId}:decide:
    post:
      tags: [ExecutionRunner]
      operationId: decideApproval
      summary: Decide approval request.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/artifacts:
    get:
      tags: [ExecutionRunner]
      operationId: listArtifacts
      summary: List artifacts.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "200":
          $ref: "#/components/responses/List"

  /v1/artifacts/{artifactId}:
    get:
      tags: [ExecutionRunner]
      operationId: getArtifact
      summary: Get artifact metadata.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ArtifactId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/artifacts/{artifactId}/content:
    get:
      tags: [ExecutionRunner]
      operationId: getArtifactContent
      summary: Get artifact content or redirect.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ArtifactId"
      responses:
        "200":
          description: Artifact content.
        "302":
          description: Redirect to signed artifact URL.

  /v1/artifacts/{artifactId}:apply:
    post:
      tags: [ExecutionRunner]
      operationId: applyArtifact
      summary: Apply artifact to target workspace.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ArtifactId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/artifacts/{artifactId}:discard:
    post:
      tags: [ExecutionRunner]
      operationId: discardArtifact
      summary: Discard artifact.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/ArtifactId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/previews:
    get:
      tags: [ExecutionRunner]
      operationId: listPreviews
      summary: List previews.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "200":
          $ref: "#/components/responses/List"
    post:
      tags: [ExecutionRunner]
      operationId: createPreview
      summary: Start preview.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/previews/{previewId}:
    get:
      tags: [ExecutionRunner]
      operationId: getPreview
      summary: Get preview.
      x-agenthub-phase: P0
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/PreviewId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/previews/{previewId}:stop:
    post:
      tags: [ExecutionRunner]
      operationId: stopPreview
      summary: Stop preview.
      x-agenthub-phase: P1
      x-agenthub-owner: Edge
      parameters:
        - $ref: "#/components/parameters/PreviewId"
      responses:
        "202":
          $ref: "#/components/responses/Accepted"

  /v1/workspaces/{workspaceId}:
    get:
      tags: [ExecutionRunner]
      operationId: getWorkspace
      summary: Get workspace.
      x-agenthub-phase: P0
      x-agenthub-owner: Runner
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/workspaces/{workspaceId}/files:
    get:
      tags: [ExecutionRunner]
      operationId: listWorkspaceFiles
      summary: List workspace files.
      x-agenthub-phase: P0
      x-agenthub-owner: Runner
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/List"

  /v1/workspaces/{workspaceId}/files:read:
    post:
      tags: [ExecutionRunner]
      operationId: readWorkspaceFile
      summary: Read workspace file by path.
      description: File path is passed in the JSON body so slash-containing paths do not become ambiguous URL segments.
      x-agenthub-phase: P0
      x-agenthub-owner: Runner
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /v1/workspaces/{workspaceId}/files:search:
    post:
      tags: [ExecutionRunner]
      operationId: searchWorkspaceFiles
      summary: Search workspace files.
      x-agenthub-phase: P1
      x-agenthub-owner: Runner
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/List"

  # ── Missing from original spec ──────────────────────────────

  /v1/metrics:
    get:
      tags: [Foundation]
      operationId: getMetrics
      summary: Prometheus metrics.
      x-agenthub-status: implemented
      x-agenthub-owner: Edge
      responses:
        "200":
          description: Prometheus text format.

  /v1/agent-instances:
    get:
      tags: [ExecutionRunner]
      operationId: listAgentInstances
      summary: List orchestrator sub-agent instances.
      x-agenthub-status: implemented
      x-agenthub-owner: Edge
      parameters:
        - name: runId
          in: query
          schema: { type: string }
        - name: parentId
          in: query
          schema: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/List"
    post:
      tags: [ExecutionRunner]
      operationId: createAgentInstance
      summary: Register a sub-agent instance.
      x-agenthub-status: implemented
      x-agenthub-owner: Edge
      responses:
        "201":
          $ref: "#/components/responses/Created"

  /v1/permissions/decide:
    post:
      tags: [ExecutionRunner]
      operationId: decidePermission
      summary: Approve or deny a pending permission request.
      x-agenthub-status: implemented
      x-agenthub-owner: Edge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, decision]
              properties:
                requestId: { type: string }
                decision: { type: string, enum: [allow, deny] }
                reason: { type: string }
      responses:
        "200":
          description: Decision recorded.

  # ═══════════════════════════════════════════════════════════
  # Hub Server Routes (prefix: /client, /edge, /web, /api/public)
  # ═══════════════════════════════════════════════════════════

  /health:
    get:
      tags: [HubSyncRelay]
      operationId: hubHealth
      summary: Hub health check (DB + Redis + migrations).
      x-agenthub-status: implemented
      x-agenthub-owner: Hub
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/public/stats:
    get:
      tags: [HubSyncRelay]
      operationId: publicStats
      summary: Public statistics for official website.
      x-agenthub-status: implemented
