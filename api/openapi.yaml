components:
  parameters:
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    PageCursor:
      name: pageCursor
      in: query
      required: false
      schema:
        type: string
    ProjectIdQuery:
      name: projectId
      in: query
      required: false
      schema:
        type: string
    ThreadIdQuery:
      name: threadId
      in: query
      required: false
      schema:
        type: string
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
    RunnerId:
      name: runnerId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    ApprovalId:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
    ArtifactId:
      name: artifactId
      in: path
      required: true
      schema:
        type: string
    PreviewId:
      name: previewId
      in: path
      required: true
      schema:
        type: string
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
    EdgeId:
      name: edgeId
      in: path
      required: true
      schema:
        type: string
    CommandId:
      name: commandId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Resource:
      type: object
      additionalProperties: true
    ListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        page:
          $ref: "#/components/schemas/PageInfo"
    PageInfo:
      type: object
      required: [hasMore]
      properties:
        nextCursor:
          type: string
        hasMore:
          type: boolean
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            traceId:
              type: string
            details:
              type: object
              additionalProperties: true
    HubTaskAckRequest:
      type: object
      properties:
        run_id:
          type: string
          description: Edge run id returned by POST /v1/runs.
        edge_run_id:
          type: string
          description: Alias for run_id for explicit Hub persistence.
    StartRunRequest:
      type: object
      properties:
        projectId:
          type: string
          description: Project to bind the run to. Defaults to the local project in P0 compatibility mode.
        threadId:
          type: string
          description: Thread to bind the run to. Defaults to the local thread in P0 compatibility mode.
        prompt:
          type: string
          description: User message or task description passed to the agent.
        agentId:
          type: string
          description: Agent adapter ID (claude-code, codex, opencode, orchestrator). Defaults to the server's --agent-default.
        model:
          type: string
          description: Model override for this run (e.g. claude-sonnet-4-6).
        sessionId:
          type: string
          description: Resume a specific session by ID (Claude Code --resume, OpenCode --session).
        continue:
          type: boolean
          description: Continue the most recent session (Claude Code --continue, OpenCode --continue).
        fork:
          type: boolean
          description: Fork session before continuing (Claude Code --fork-session, OpenCode --fork).
        reasoningEffort:
          type: string
          description: >
            Reasoning effort level. Claude Code values: low, medium, high, max.
            Codex values: minimal, low, medium, high, xhigh.
            OpenCode: passed as --variant for thinking control.
        maxThinkingTokens:
          type: integer
          description: Maximum thinking token budget (Claude Code --max-thinking-tokens).
        permissionMode:
          type: string
          description: >
            Claude Code permission mode: default, acceptEdits, bypassPermissions, plan, dontAsk.
            Also mapped to Codex --sandbox level.
        includePartial:
          type: boolean
          description: Include partial stream_event messages for real-time deltas (Claude Code --include-partial-messages).
    AgentInfo:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
          description: Agent adapter ID.
        name:
          type: string
          description: Display name.
        description:
          type: string
          description: Human-readable description.
        version:
          type: string
          description: CLI version if detected.
        status:
          type: string
          description: '"available" if the agent CLI is configured and reachable.'
        capabilities:
          type: object
          additionalProperties: true
          description: Capability flags (streaming, toolCalls, fileChanges, etc.).
    CreateThreadMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          description: Message body. Whitespace-only content is rejected by the Edge server.
        role:
          type: string
          default: user
          description: Message role. Defaults to user when omitted.
    Item:
      type: object
      required: [itemId, projectId, threadId, type, status, createdAt, updatedAt]
      properties:
        itemId:
          type: string
        projectId:
          type: string
        threadId:
          type: string
        runId:
          type: string
        type:
          type: string
        role:
          type: string
        status:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Run:
      type: object
      required: [runId, projectId, threadId, status, createdAt]
      properties:
        runId:
          type: string
        projectId:
          type: string
        threadId:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
  responses:
    Ok:
      description: OK.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Resource"
    Created:
      description: Created.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Resource"
    Accepted:
      description: Accepted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Resource"
    List:
      description: List response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ListResponse"
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
